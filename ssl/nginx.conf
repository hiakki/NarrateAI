# Local reverse proxy for NarrateAI-style apps.
# Run: nginx -c /path/to/contrib/nginx/nginx.conf -g 'daemon off;'
# Or symlink this file and use your OS nginx include.

worker_processes 1;
error_log stderr;
pid /tmp/nginx-narrateai.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types; # relative to -p prefix (this directory)
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstreams (Next.js app, Vite dev server)
    upstream narrate_app {
        server 127.0.0.1:3000;
    }
    upstream narrate_chat {
        server 127.0.0.1:5173;
    }

    # --- HTTP: redirect to HTTPS ---
    server {
        listen 80;
        server_name app.narrateai.online chat.narrateai.online;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80;
        server_name narrateai.online www.narrateai.online;
        return 301 https://app.narrateai.online$request_uri;
    }

    # --- HTTPS: app (Next.js) ---
    server {
        listen 443 ssl http2;
        server_name app.narrateai.online;

        ssl_certificate     certs/narrateai.pem;
        ssl_certificate_key certs/narrateai-key.pem;

        # Optional: tighten for local only
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://narrate_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- HTTPS: chat (Vite) — WebSocket for HMR ---
    server {
        listen 443 ssl http2;
        server_name chat.narrateai.online;

        ssl_certificate     certs/narrateai.pem;
        ssl_certificate_key certs/narrateai-key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://narrate_chat;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
